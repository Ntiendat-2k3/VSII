<div class="filters-flex">
  <!-- Hot filter chip -->
  <div 
    class="filter-chip chip-hot" 
    [class.active]="isActive(HOT_FILTER)"
    (click)="toggleFilter(HOT_FILTER)"
  >
    <span class="chip-checkbox">
      @if (isActive(HOT_FILTER)) {
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-square-check"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="m9 12 2 2 4-4"/></svg>
      } @else {
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-square"><rect width="18" height="18" x="3" y="3" rx="2"/></svg>
      }
    </span>
    <img src="/icon_type/hot.png" alt="Căn HOT" class="chip-image" />
    <span class="chip-label">Căn HOT</span>
  </div>

  <!-- Normal filters -->
  @for (filter of normalFilters(); track filter.code) {
    <div 
      class="filter-chip" 
      [class.active]="isActive(filter.code)"
      (click)="toggleFilter(filter.code)"
    >
      <span class="chip-checkbox">
        @if (isActive(filter.code)) {
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-square-check"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="m9 12 2 2 4-4"/></svg>
        } @else {
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-square"><rect width="18" height="18" x="3" y="3" rx="2"/></svg>
        }
      </span>
      <img [src]="icons[filter.code] || '/icon_type/donlap.png'" [alt]="filter.value" class="chip-image" />
      <span class="chip-label">{{ filter.value }}</span>
    </div>
  }
</div>
